name: IA Monitoring IRM

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  analyse_ia:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./Cloud_IA_IRM

    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Configuration de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installation et Exécution de l'IA
        run: |
          python -m pip install --upgrade pip
          pip install xgboost==1.7.6 pandas requests scipy scikit-learn pytz
          python ia_irm.py
