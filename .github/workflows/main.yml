name: IA Monitoring IRM

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  analyse_ia:
    runs-on: ubuntu-latest
    
    # ---> LA SOLUTION MAGIQUE : On dit à GitHub de se placer dans le dossier <---
    defaults:
      run:
        working-directory: ./Cloud_IA_IRM

    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Configuration de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installation des bibliothèques IA
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Exécution de l'analyse XGBoost
        run: |
          python ia_irm.py
